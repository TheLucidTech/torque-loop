name: Bug report
description: Something in the plugin or the ratchet CLI behaves wrong.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough for someone to reproduce it.
        For **security vulnerabilities**, do not file here — see [SECURITY.md](../../security/policy).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, and what went wrong?
      placeholder: I ran `/ratchet:build ...` and ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
      placeholder: I expected the artifact to ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command(s) or slash command(s).
      placeholder: |
        1. ...
        2. ...
        3. ...
      render: text
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did it happen?
      options:
        - A /ratchet:* slash command (plugin)
        - The `ratchet` CLI
        - The `ratchet-evolve` CLI / `/ratchet:evolve` loop
        - A hook (SessionStart / PostToolUse / Stop)
        - Install / marketplace
        - Docs / README
        - Not sure
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Output of `node --version` and `ratchet --version`, plus your OS.
      placeholder: node v20.11.0 · ratchet 0.2.0 · Windows 11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Any error output. Redact anything sensitive.
      render: shell
    validations:
      required: false
