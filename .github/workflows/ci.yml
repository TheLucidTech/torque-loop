name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # Zero runtime dependencies — no install step is needed; `npm test`
      # just runs the smoke suites directly with node.
      - name: Run tests
        run: npm test

      - name: Smoke-check the CLI
        run: |
          node bin/ratchet --version
          node bin/ratchet --help
          node bin/ratchet doctor
          node bin/ratchet-evolve --help
          node bin/ratchet-evolve status
